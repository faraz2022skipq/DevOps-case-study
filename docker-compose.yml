services:
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
    restart: unless-stopped
    logging:
      driver: awslogs
      options:
        awslogs-group: "/aws/ec2/junior-devops-case-study/nginx"
        awslogs-region: "us-west-1"
        awslogs-stream: "nginx"

  backend:
    image: ${ECR_REPOSITORY_URL}:${IMAGE_TAG:-latest}
    environment:
      - DJANGO_SETTINGS_MODULE=backend.settings
      - DB_NAME=${DATABASE_NAME}
      - DB_USER=${DATABASE_USER}
      - DB_PASSWORD=${DATABASE_PASSWORD}
      - DB_HOST=${DATABASE_HOST}
      - DB_PORT=5432
      - AWS_REGION=${AWS_REGION}
      - SECRET_KEY=${DJANGO_SECRET_KEY}
    ports:
      - "8000:8000"
    restart: unless-stopped
    logging:
      driver: awslogs
      options:
        awslogs-group: "/aws/ec2/junior-devops-case-study/django"
        awslogs-region: "us-west-1"
        awslogs-stream: "django"
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/healthz')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  nginx_logs:

networks:
  default:
    name: app-network
    driver: bridge
